<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PourAI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F0F1A; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    header { background: #1A1A2E; border-bottom: 1px solid #2A2A3E; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 20px; font-weight: 700; }
    .scan-counter { font-size: 12px; color: #9090B0; background: #2A2A3E; padding: 4px 10px; border-radius: 20px; }
    .btn-logout { background: none; border: 1px solid #2A2A3E; color: #9090B0; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: #1A1A2E; border: 1px solid #2A2A3E; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .card h2 { font-size: 18px; font-weight: 700; }
    label { font-size: 11px; color: #666680; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 6px; }
    input[type="email"], input[type="password"], input[type="text"], input[type="date"], input[type="number"] { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 8px; color: #fff; font-size: 15px; padding: 12px; width: 100%; }
    input:focus { outline: none; border-color: #6C63FF; }
    select { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 8px; color: #fff; font-size: 14px; padding: 12px; width: 100%; }
    button { cursor: pointer; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; padding: 13px 20px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; width: 100%; }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6C63FF; color: #fff; }
    .btn-secondary { background: #2A2A3E; color: #fff; }
    .btn-danger { background: #3A1A1A; color: #FF6B6B; border: 1px solid #5A2A2A; }
    .btn-success { background: #1A3A2A; color: #4CAF50; border: 1px solid #2A5A3A; }
    .btn-analyze { background: linear-gradient(135deg, #6C63FF, #9C63FF); color: #fff; font-size: 16px; padding: 15px; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row button { flex: 1; }
    .btn-back { background: none; border: none; color: #6C63FF; font-size: 14px; padding: 0; width: auto; justify-content: flex-start; margin-bottom: 4px; }
    .image-box { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 12px; height: 260px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .image-box img { width: 100%; height: 100%; object-fit: contain; }
    .placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #666680; }
    .placeholder .icon { font-size: 48px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #2A2A3E; border-top-color: #6C63FF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { text-align: center; padding: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .loading p { color: #9090B0; }
    .result-card { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .brand { font-size: 17px; font-weight: 700; }
    .vol-row { display: flex; align-items: center; }
    .vol-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .vol-label { font-size: 11px; color: #666680; text-transform: uppercase; letter-spacing: 0.8px; }
    .vol-value { font-size: 24px; font-weight: 700; }
    .vol-divider { width: 1px; height: 36px; background: #2A2A3E; }
    .progress-row { display: flex; align-items: center; gap: 10px; }
    .progress-track { flex: 1; height: 8px; background: #2A2A3E; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; }
    .progress-pct { font-size: 13px; font-weight: 700; width: 38px; text-align: right; }
    .notes { font-size: 13px; color: #9090B0; font-style: italic; line-height: 1.5; }
    .error-box { background: #2A1A1A; border: 1px solid #5A2A2A; border-radius: 12px; padding: 14px; color: #FF6B6B; font-size: 14px; }
    .success-box { background: #1A2A1A; border: 1px solid #2A5A2A; border-radius: 12px; padding: 14px; color: #4CAF50; font-size: 14px; }
    .toggle-link { text-align: center; font-size: 14px; color: #9090B0; cursor: pointer; }
    .toggle-link span { color: #6C63FF; text-decoration: underline; }
    .inventory-badge { display: inline-flex; align-items: center; gap: 6px; background: #1A2A1A; border: 1px solid #2A5A2A; color: #4CAF50; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .scans-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
    .scan-item { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .scan-item-left { display: flex; flex-direction: column; gap: 3px; }
    .scan-item-brand { font-size: 14px; font-weight: 600; }
    .scan-item-time { font-size: 12px; color: #666680; }
    .scan-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .scan-item-ml { font-size: 15px; font-weight: 700; }
    .scan-item-pct { font-size: 12px; color: #666680; }
    .inv-list { display: flex; flex-direction: column; gap: 10px; }
    .inv-item { background: #0F0F1A; border: 1px solid #2A2A3E; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: border-color 0.2s; }
    .inv-item:hover { border-color: #6C63FF; }
    .inv-item-left { display: flex; flex-direction: column; gap: 4px; }
    .inv-item-name { font-size: 15px; font-weight: 600; }
    .inv-item-meta { font-size: 12px; color: #666680; }
    .inv-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .badge-open { background: #1A2A1A; color: #4CAF50; border: 1px solid #2A5A2A; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-closed { background: #2A2A3E; color: #9090B0; border: 1px solid #3A3A4E; padding: 3px 8px; border-radius: 10px; font-size: 11px; }
    .export-row { display: flex; gap: 8px; }
    .export-row button { flex: 1; font-size: 13px; padding: 11px; }
    .nav-tabs { display: flex; gap: 4px; background: #0F0F1A; border-radius: 10px; padding: 4px; }
    .nav-tab { flex: 1; background: none; border: none; color: #666680; font-size: 13px; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .nav-tab.active { background: #2A2A3E; color: #fff; }
    input[type="file"] { display: none; }
    #loginScreen { display: flex; min-height: 100vh; align-items: center; }
    #appScreen { display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="container" style="width:100%;">
    <div class="card" style="margin-top:40px;">
      <div style="text-align:center; font-size:44px;">🍾</div>
      <h2 style="text-align:center;">PourAI</h2>
      <p style="text-align:center; color:#9090B0; font-size:14px;">Inventúra alkoholu pre bary</p>
      <div id="loginForm" style="display:flex;flex-direction:column;gap:14px;">
        <div><label>Email</label><input type="email" id="loginEmail" placeholder="bar@example.com" /></div>
        <div><label>Heslo</label><input type="password" id="loginPassword" placeholder="••••••••" /></div>
        <button class="btn-primary" onclick="login()">Prihlásiť sa</button>
        <div class="toggle-link" onclick="showRegister()">Nemáš účet? <span>Zaregistruj sa</span></div>
      </div>
      <div id="registerForm" style="display:none;flex-direction:column;gap:14px;">
        <div><label>Email</label><input type="email" id="regEmail" placeholder="bar@example.com" /></div>
        <div><label>Heslo</label><input type="password" id="regPassword" placeholder="min. 6 znakov" /></div>
        <button class="btn-primary" onclick="register()">Vytvoriť účet</button>
        <div class="toggle-link" onclick="showLogin()">Máš účet? <span>Prihlás sa</span></div>
      </div>
      <div id="authOutput"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="header-left"><span>🍾</span><h1>PourAI</h1></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="scan-counter" id="scanCounter">0 / 150</span>
      <button class="btn-logout" onclick="logout()">Odhlásiť</button>
    </div>
  </header>

  <!-- HOME -->
  <div id="homeScreen" class="container" style="display:none;">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('tabNew')">➕ Nová inventúra</button>
      <button class="nav-tab" onclick="showTab('tabHistory')">📋 História</button>
    </div>

    <!-- NOVÁ INVENTÚRA -->
    <div id="tabNew" class="card">
      <h2>Nová inventúra</h2>
      <div>
        <label>Typ inventúry</label>
        <select id="invType" onchange="onInvTypeChange()">
          <option value="day">Denná</option>
          <option value="week">Týždenná</option>
          <option value="month" selected>Mesačná</option>
          <option value="quarter">Štvrťročná</option>
          <option value="year">Ročná</option>
          <option value="custom">Vlastné obdobie</option>
        </select>
      </div>
      <div id="invPeriodPicker"></div>
      <div id="invCustomPicker" style="display:none;flex-direction:column;gap:10px;">
        <div class="btn-row">
          <div style="flex:1;"><label>Od</label><input type="date" id="invDateFrom" /></div>
          <div style="flex:1;"><label>Do</label><input type="date" id="invDateTo" /></div>
        </div>
      </div>
      <div><label>Názov inventúry</label><input type="text" id="invName" /></div>
      <button class="btn-primary" onclick="startInventory()">▶️ Začať inventúru</button>
    </div>

    <!-- HISTÓRIA -->
    <div id="tabHistory" style="display:none;" class="card">
      <h2>História inventúr</h2>
      <div class="inv-list" id="invList"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- AKTÍVNA INVENTÚRA -->
  <div id="activeScreen" class="container" style="display:none;">
    <div class="card">
      <button class="btn-back" onclick="goHome()">← Späť</button>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:13px;color:#666680;margin-bottom:4px;">Aktívna inventúra</div>
          <div style="font-size:18px;font-weight:700;" id="activeInvName"></div>
        </div>
        <div class="inventory-badge">🟢 Aktívna</div>
      </div>
      <button class="btn-danger" onclick="closeInventory()">🔒 Uzavrieť inventúru</button>
    </div>

    <div class="card">
      <div class="image-box" id="imageBox">
        <div class="placeholder"><span class="icon">🍾</span><p>Odfotte alebo vyberte fľašu</p></div>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="document.getElementById('cameraInput').click()">📷 Fotoaparát</button>
        <button class="btn-secondary" onclick="document.getElementById('galleryInput').click()">🖼️ Galéria</button>
      </div>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFile(this)" />
      <input type="file" id="galleryInput" accept="image/*" onchange="handleFile(this)" />
      <button class="btn-analyze" id="analyzeBtn" disabled onclick="analyze()">🔍 Analyzovať fľašu</button>
      <div id="output"></div>
    </div>

    <div class="card" id="activeScansCard" style="display:none;">
      <h2>📦 Naskenované fľaše</h2>
      <div class="scans-list" id="activeScansList"></div>
    </div>
  </div>

  <!-- DETAIL INVENTÚRY -->
  <div id="detailScreen" class="container" style="display:none;">
    <div class="card">
      <button class="btn-back" onclick="goHome()">← Späť</button>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="font-size:13px;color:#666680;margin-bottom:4px;">Inventúra</div>
          <div style="font-size:18px;font-weight:700;" id="detailInvName"></div>
          <div style="font-size:12px;color:#666680;margin-top:4px;" id="detailInvMeta"></div>
        </div>
        <div id="detailBadge"></div>
      </div>
    </div>

    <div class="card">
      <h2>📊 Export</h2>
      <div class="export-row">
        <button class="btn-secondary" onclick="exportExcel()">📗 Excel</button>
        <button class="btn-secondary" onclick="exportPDF()">📄 PDF</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>📦 Fľaše</h2>
        <div style="font-size:13px;color:#666680;" id="detailCount"></div>
      </div>
      <div class="scans-list" id="detailScansList"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://iowtbwejpixzwakchhls.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3Rid2VqcGl4endha2NoaGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzgxMDIsImV4cCI6MjA5MjQ1NDEwMn0.L6tX0L-pPvxXYBZ8JF4HT7XINh3lI83LGYYjwSB3Y4s';
  let token = null;
  let userId = null;
  let base64Data = null;
  let currentInventory = null;
  let currentScans = [];
  let detailInventory = null;
  let detailScans = [];

  async function api(path, method = 'GET', body = null, auth = true) {
    const headers = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Prefer': 'return=representation' };
    if (auth) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(SUPABASE_URL + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (res.status === 204 || res.headers.get('content-length') === '0') return {};
    try { return await res.json(); } catch { return {}; }
  }

  function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const out = document.getElementById('authOutput');
    out.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const data = await api('/auth/v1/token?grant_type=password', 'POST', { email, password }, false);
    if (data.error) { out.innerHTML = `<div class="error-box">❌ ${data.error_description || data.error}</div>`; return; }
    token = data.access_token;
    userId = data.user.id;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    goHome();
  }

  async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const out = document.getElementById('authOutput');
    out.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const data = await api('/auth/v1/signup', 'POST', { email, password }, false);
    if (data.error) { out.innerHTML = `<div class="error-box">❌ ${data.error_description || data.error}</div>`; return; }
    out.innerHTML = `<div class="success-box">✅ Účet vytvorený! Skontroluj email.</div>`;
  }

  function logout() {
    token = null; userId = null; currentInventory = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }

  function showRegister() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'flex'; document.getElementById('authOutput').innerHTML = ''; }
  function showLogin() { document.getElementById('registerForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'flex'; document.getElementById('authOutput').innerHTML = ''; }

  function showScreen(name) {
    ['homeScreen','activeScreen','detailScreen'].forEach(s => document.getElementById(s).style.display = 'none');
    document.getElementById(name).style.display = 'flex';
    document.getElementById(name).style.flexDirection = 'column';
  }

  async function goHome() {
    showScreen('homeScreen');
    onInvTypeChange();
    await loadHistory();
    await checkActiveInventory();
  }

  function showTab(tab) {
    ['tabNew','tabHistory'].forEach(t => { document.getElementById(t).style.display = 'none'; });
    document.getElementById(tab).style.display = 'flex';
    document.querySelectorAll('.nav-tab').forEach((el, i) => el.classList.toggle('active', (i === 0 && tab === 'tabNew') || (i === 1 && tab === 'tabHistory')));
  }

  async function checkActiveInventory() {
    const data = await api('/rest/v1/inventories?status=eq.open&order=created_at.desc&limit=1');
    if (data && data.length > 0) {
      currentInventory = data[0];
      document.getElementById('activeInvName').textContent = currentInventory.name;
      await loadActiveScans();
      showScreen('activeScreen');
    }
  }

  async function loadHistory() {
    const data = await api('/rest/v1/inventories?order=created_at.desc&select=*');
    const list = document.getElementById('invList');
    if (!data || data.length === 0) { list.innerHTML = '<p style="color:#666680;font-size:14px;">Žiadne inventúry</p>'; return; }
    list.innerHTML = data.map(inv => {
      const date = new Date(inv.created_at).toLocaleDateString('sk-SK');
      const badge = inv.status === 'open' ? '<span class="badge-open">Aktívna</span>' : '<span class="badge-closed">Uzavretá</span>';
      return `<div class="inv-item" onclick="openDetail('${inv.id}')">
        <div class="inv-item-left">
          <div class="inv-item-name">${inv.name}</div>
          <div class="inv-item-meta">${date}</div>
        </div>
        <div class="inv-item-right">${badge}<span style="font-size:20px;color:#666680">›</span></div>
      </div>`;
    }).join('');
  }

  async function openDetail(invId) {
    const invData = await api(`/rest/v1/inventories?id=eq.${invId}`);
    detailInventory = invData[0];
    const scans = await api(`/rest/v1/scans?inventory_id=eq.${invId}&order=created_at.desc`);
    detailScans = scans || [];

    document.getElementById('detailInvName').textContent = detailInventory.name;
    const created = new Date(detailInventory.created_at).toLocaleDateString('sk-SK');
    const closed = detailInventory.closed_at ? new Date(detailInventory.closed_at).toLocaleDateString('sk-SK') : null;
    document.getElementById('detailInvMeta').textContent = closed ? `${created} — ${closed}` : `Vytvorená: ${created}`;
    document.getElementById('detailBadge').innerHTML = detailInventory.status === 'open' ? '<span class="badge-open">Aktívna</span>' : '<span class="badge-closed">Uzavretá</span>';
    document.getElementById('detailCount').textContent = `${detailScans.length} fľaší`;

    const list = document.getElementById('detailScansList');
    if (detailScans.length === 0) { list.innerHTML = '<p style="color:#666680;font-size:14px;">Žiadne skeny</p>'; }
    else {
      list.innerHTML = detailScans.map(s => {
        const color = s.remaining_percent > 50 ? '#4CAF50' : s.remaining_percent > 20 ? '#FF9800' : '#F44336';
        const time = new Date(s.created_at).toLocaleString('sk-SK');
        return `<div class="scan-item">
          <div class="scan-item-left">
            <div class="scan-item-brand">${s.brand}</div>
            <div class="scan-item-time">${time} · ${s.total_volume_ml}ml celkom</div>
          </div>
          <div class="scan-item-right">
            <div class="scan-item-ml" style="color:${color}">${s.remaining_ml}ml</div>
            <div class="scan-item-pct">${s.remaining_percent}%</div>
          </div>
        </div>`;
      }).join('');
    }
    showScreen('detailScreen');
  }

  async function startInventory() {
    const name = document.getElementById('invName').value.trim();
    await api('/rest/v1/inventories', 'POST', {
      user_id: userId,
      name: name || 'Inventúra',
      status: 'open'
    });
    await checkActiveInventory();
  }

  async function closeInventory() {
    if (!confirm('Naozaj chceš uzavrieť inventúru?')) return;
    await api(`/rest/v1/inventories?id=eq.${currentInventory.id}`, 'PATCH', {
      status: 'closed',
      closed_at: new Date().toISOString()
    });
    currentInventory = null;
    goHome();
  }

  async function loadActiveScans() {
    if (!currentInventory) return;
    const data = await api(`/rest/v1/scans?inventory_id=eq.${currentInventory.id}&order=created_at.desc`);
    currentScans = data || [];
    if (currentScans.length > 0) {
      document.getElementById('activeScansCard').style.display = 'flex';
      document.getElementById('activeScansList').innerHTML = currentScans.map(s => {
        const color = s.remaining_percent > 50 ? '#4CAF50' : s.remaining_percent > 20 ? '#FF9800' : '#F44336';
        const time = new Date(s.created_at).toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' });
        return `<div class="scan-item">
          <div class="scan-item-left">
            <div class="scan-item-brand">${s.brand}</div>
            <div class="scan-item-time">${time} · ${s.total_volume_ml}ml celkom</div>
          </div>
          <div class="scan-item-right">
            <div class="scan-item-ml" style="color:${color}">${s.remaining_ml}ml</div>
            <div class="scan-item-pct">${s.remaining_percent}%</div>
          </div>
        </div>`;
      }).join('');
    }
  }

  function onInvTypeChange() {
    const type = document.getElementById('invType')?.value;
    if (!type) return;
    const picker = document.getElementById('invPeriodPicker');
    const custom = document.getElementById('invCustomPicker');
    const nameInput = document.getElementById('invName');
    const now = new Date();
    picker.style.display = 'none';
    custom.style.display = 'none';

    if (type === 'day') {
      picker.style.display = 'block';
      picker.innerHTML = `<label>Dátum</label><input type="date" id="invDay" value="${now.toISOString().split('T')[0]}" />`;
      nameInput.value = now.toLocaleDateString('sk-SK');
    } else if (type === 'week') {
      const monday = new Date(now); monday.setDate(now.getDate() - now.getDay() + 1);
      picker.style.display = 'block';
      picker.innerHTML = `<label>Začiatok týždňa</label><input type="date" id="invWeek" value="${monday.toISOString().split('T')[0]}" />`;
      nameInput.value = `Týždeň od ${monday.toLocaleDateString('sk-SK')}`;
    } else if (type === 'month') {
      picker.style.display = 'block';
      picker.innerHTML = `<label>Mesiac</label><select id="invMonth" onchange="updateMonthName()">
        ${Array.from({length:12},(_,i)=>{ const d=new Date(); d.setMonth(i); return `<option value="${i}" ${i===now.getMonth()?'selected':''}>${capitalize(d.toLocaleString('sk-SK',{month:'long'}))}</option>`; }).join('')}
      </select>`;
      nameInput.value = capitalize(now.toLocaleString('sk-SK',{month:'long',year:'numeric'}));
    } else if (type === 'quarter') {
      const q = Math.floor(now.getMonth()/3)+1;
      picker.style.display = 'block';
      picker.innerHTML = `<label>Štvrťrok</label><select id="invQuarter" onchange="updateQuarterName()">
        <option value="1" ${q===1?'selected':''}>Q1 (Jan–Mar)</option>
        <option value="2" ${q===2?'selected':''}>Q2 (Apr–Jún)</option>
        <option value="3" ${q===3?'selected':''}>Q3 (Júl–Sep)</option>
        <option value="4" ${q===4?'selected':''}>Q4 (Okt–Dec)</option>
      </select>`;
      nameInput.value = `Q${q} ${now.getFullYear()}`;
    } else if (type === 'year') {
      picker.style.display = 'block';
      picker.innerHTML = `<label>Rok</label><input type="number" id="invYear" value="${now.getFullYear()}" min="2020" max="2035" onchange="document.getElementById('invName').value=this.value" />`;
      nameInput.value = `${now.getFullYear()}`;
    } else if (type === 'custom') {
      custom.style.display = 'flex';
      const from = now.toISOString().split('T')[0];
      document.getElementById('invDateFrom').value = from;
      document.getElementById('invDateTo').value = from;
      nameInput.value = 'Vlastné obdobie';
    }
  }

  function updateMonthName() {
    const i = parseInt(document.getElementById('invMonth').value);
    const d = new Date(); d.setMonth(i);
    document.getElementById('invName').value = capitalize(d.toLocaleString('sk-SK',{month:'long',year:'numeric'}));
  }

  function updateQuarterName() {
    const q = document.getElementById('invQuarter').value;
    document.getElementById('invName').value = `Q${q} ${new Date().getFullYear()}`;
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      base64Data = e.target.result.split(',')[1];
      document.getElementById('imageBox').innerHTML = `<img src="${e.target.result}" />`;
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('output').innerHTML = '';
    };
    reader.readAsDataURL(file);
  }

  function getColor(pct) {
    if (pct > 50) return '#4CAF50';
    if (pct > 20) return '#FF9800';
    return '#F44336';
  }

  async function analyze() {
    if (!base64Data || !token || !currentInventory) return;
    document.getElementById('output').innerHTML = `<div class="loading"><div class="spinner"></div><p>Analyzujem fľašu...</p></div>`;
    document.getElementById('analyzeBtn').disabled = true;
    try {
      const res = await fetch(SUPABASE_URL + '/functions/v1/super-endpoint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ image: base64Data, inventory_id: currentInventory.id })
      });
      const r = await res.json();
      if (r.error) throw new Error(r.error);
      const color = getColor(r.remainingPercent);
      document.getElementById('scanCounter').textContent = r.scansUsed + ' / 150';
      document.getElementById('output').innerHTML = `
        <div class="result-card">
          <div class="brand">${r.brand}</div>
          <div class="vol-row">
            <div class="vol-item"><span class="vol-label">Celkový objem</span><span class="vol-value">${r.totalVolumeMl} ml</span></div>
            <div class="vol-divider"></div>
            <div class="vol-item"><span class="vol-label">Zostatok</span><span class="vol-value" style="color:${color}">${r.remainingMl} ml</span></div>
          </div>
          <div class="progress-row">
            <div class="progress-track"><div class="progress-fill" style="width:${r.remainingPercent}%;background:${color}"></div></div>
            <span class="progress-pct" style="color:${color}">${r.remainingPercent}%</span>
          </div>
          ${r.notes ? `<div class="notes">${r.notes}</div>` : ''}
        </div>`;
      await loadActiveScans();
    } catch (e) {
      document.getElementById('output').innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
    } finally {
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  async function exportExcel() {
    if (!detailScans.length) { alert('Žiadne dáta'); return; }
    const rows = detailScans.map(s => ({
      'Značka': s.brand,
      'Celkový objem (ml)': s.total_volume_ml,
      'Zostatok (ml)': s.remaining_ml,
      'Zostatok (%)': s.remaining_percent,
      'Poznámka': s.notes || '',
      'Dátum a čas': new Date(s.created_at).toLocaleString('sk-SK')
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:35},{wch:18},{wch:15},{wch:13},{wch:40},{wch:20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Inventúra');
    XLSX.writeFile(wb, `PourAI_${detailInventory.name.replace(/\s/g,'_')}.xlsx`);
  }

  async function exportPDF() {
    if (!detailScans.length) { alert('Žiadne dáta'); return; }
    const totalRemaining = detailScans.reduce((s,r) => s+(r.remaining_ml||0), 0);
    const rows = detailScans.map(s => `<tr>
      <td>${s.brand}</td>
      <td style="text-align:center">${s.total_volume_ml}ml</td>
      <td style="text-align:center">${s.remaining_ml}ml</td>
      <td style="text-align:center">${s.remaining_percent}%</td>
      <td style="color:#666">${s.notes||''}</td>
      <td style="text-align:center;color:#666">${new Date(s.created_at).toLocaleString('sk-SK')}</td>
    </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#222;}
      h1{color:#6C63FF;margin-bottom:4px;}
      .meta{color:#666;font-size:13px;margin-bottom:20px;}
      .summary{background:#f5f5f5;padding:14px 20px;border-radius:8px;margin-bottom:20px;display:flex;gap:30px;}
      .sl{display:flex;flex-direction:column;}
      .sl span:first-child{font-size:11px;color:#888;text-transform:uppercase;}
      .sl span:last-child{font-size:22px;font-weight:bold;}
      table{width:100%;border-collapse:collapse;font-size:13px;}
      th{background:#6C63FF;color:white;padding:10px 12px;text-align:left;}
      td{padding:9px 12px;border-bottom:1px solid #eee;}
      tr:nth-child(even) td{background:#f9f9f9;}
    </style></head><body>
    <h1>🍾 PourAI — ${detailInventory.name}</h1>
    <div class="meta">Exportované: ${new Date().toLocaleString('sk-SK')}</div>
    <div class="summary">
      <div class="sl"><span>Počet fľaší</span><span>${detailScans.length}</span></div>
      <div class="sl"><span>Celkový zostatok</span><span>${totalRemaining}ml</span></div>
    </div>
    <table><thead><tr><th>Značka</th><th>Objem</th><th>Zostatok</th><th>%</th><th>Poznámka</th><th>Dátum</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <script>window.onload=()=>{window.print()}<\/script>
    </body></html>`;
    const win = window.open('','_blank');
    win.document.write(html);
    win.document.close();
  }
</script>
</body>
</html>
